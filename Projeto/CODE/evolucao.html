<div>

        <div class="text-section">
            <main class="evolucao">
                <h1>Acompanhe sua evolução</h1>
                <div class="boasvindas">
                    <div class="dashboard-container">
                        <canvas id="ninjaChart">
                        </canvas>

</div>

<script>
    const ctx = document.getElementById('ninjaChart').getContext('2d');

const data = {
    labels: ['Peso', 'Altura', 'Gasto calorico', '22', 'Genjutsu'],
    datasets: [{
        label: 'Atributos Ninja',
        data: [1.8, 4, 3, 2, 10],
        backgroundColor: 'rgba(255, 0, 0, 0.6)',
        borderColor: 'black',
        borderWidth: 2,
        pointRadius: 2 
    }]
};

const config = {
    type: 'radar',
    data: data,
    options: {
        scales: {
            r: {
                angleLines: { display: true },
                suggestedMin: 0,
                suggestedMax: 5,
                ticks: { display: false, stepSize: 1 },
                grid: { color: 'black' }, // Linhas da teia
                pointLabels: {
                    font: { size: 14, weight: 'bold' },
                    color: 'black'
                }
            }
        },
        plugins: {
            legend: { display: false } // Esconde a legenda para foco no gráfico
        }
    }
};

new Chart(ctx, config);
</script>
