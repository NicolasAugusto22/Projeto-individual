<script>
let lista = [];
function criar() {
    let altura = input_altura.value;
    let peso = input_peso.value;
    let objetivo = select_objetivo.value;

    if (objetivo == 1) {
        objetivo = "Perder peso";

    } else if (objetivo == 2) {
        objetivo = "Ganhar massa";

    } else if (objetivo == 3) {

    }

    lista.push(altura);
    lista.push(peso);
    lista.push(objetivo);

    console.log(lista);

}
</script>
