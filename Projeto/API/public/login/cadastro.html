<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Projeto/API/public/css/stylesLogin.css">
    <title>Cadastro</title>
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="location.reload();">
            <img src="/Projeto/API/public/assets/img/logomaiorsemfundo - Copia.png" alt="Logo" style="max-width: 100%; ">
        </div>
        <nav>
            <a href="index.login">sobre</a>
            <a href="login.html">logar</a>
        </nav>
    </header>
<br><br><br><br>
<div id="cadastrar" class="linha"></div>

    <div>
        <main class="login">
          <form>
            <h1>Faça seu cadastro para ter acesso !</h1>
            <div class="id_email">
                <input type="email" id="input_email" placeholder="Usuário">
            </div>
            <div class="id_senha">
                <input type="text" id="input_senha" placeholder="Senha">
            </div>
            <div class="id_csenha">
                <input type="password" id="input_csenha" placeholder="Confirme sua senha">
            </div>
            <div class="id_button">
            <button type="submit" onclick="cadastrar()">Cadastrar</button>
            </div>
            <div class="register-link">
                <p>Já tem uma conta? <a href="login.html" class="link">Faça login</a></p>
            </div>
          </form>
        </main>
    </div>
    <div class="linha"></div>
    <div class="container">
        <p>2026 GYMTECH. Feito por<a href="https://www.linkedin.com/in/nicolas-augusto-da-silva-62b828246" class="link" > Nicolas Augusto da Silva.</a></p>
</body>
</html>
<script>
  let listaEmpresasCadastradas = [];

  function cadastrar() {

    var emailVar = input_email.value;
    var senhaVar = input_senha.value;
    var confirmacaoSenhaVar = input_csenha.value;

    // Verificando se há algum campo em branco
    if (
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {
      alert("Preencha todos os campos !");

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        emailServer: emailVar,
        senhaServer: senhaVar,
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  // Listando empresas cadastradas 
  function listar() {
    fetch("/empresas/listar", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            listaEmpresasCadastradas.push(empresa);

            console.log("listaEmpresasCadastradas")
            console.log(listaEmpresasCadastradas[0].codigo_ativacao)
          });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
