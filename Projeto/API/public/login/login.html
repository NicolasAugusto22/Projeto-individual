<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Projeto/API/public/css/stylesLogin.css">
    <title>Login</title>
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="location.reload();">
            <img src="/Projeto/API/public/assets/img/logomaiorsemfundo - Copia.png" alt="Logo" style="max-width: 100%; ">
        </div>
        <nav>
            <a href="index.html">sobre</a>
            <a href="cadastro.html">cadastrar</a>
        </nav>
    </header>
<br><br><br><br>
<div id="login" class="linha"></div>

    <div>
        <main class="login">
          <form>
            <h1>Faça login para ter acesso !</h1>
            <div class="id_email">
                <input type="email" id="input_email" placeholder="Usuário">
            </div>
            <div class="id_senha">
                <input type="text" id="input_senha" placeholder="Senha">
            </div>
            <div class="id_csenha">
                <input type="password" id="input_csenha" placeholder="Confirme sua senha">
            </div>
            <div class="id_button">
            <button type="submit" onclick="entrar()">Entrar</button>
            </div>
            <div class="register-link">
                <p>Não tem uma conta? <a href="cadastro.html" class="link">Cadastre-se</a></p>
            </div>
          </form>
        </main>
    </div>
    <div class="linha"></div>
    <div class="container">
        <p>2026 GYMTECH. Feito por<a href="https://www.linkedin.com/in/nicolas-augusto-da-silva-62b828246" class="link" > Nicolas Augusto da Silva.</a></p>
</body>
</html>
<script>
    function entrar() {
        aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.ID_USUARIO = json.id;

                    setTimeout(function () {
                        window.location = "./dashboard/cards.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }
</script>
