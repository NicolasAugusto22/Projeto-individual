<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Projeto/API/public/css/stylesLogin.css">
    <title>Login</title>
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="location.reload();">
            <img src="/Projeto/API/public/assets/img/logomaiorsemfundo - Copia.png" alt="Logo" style="max-width: 100%; ">
        </div>
        <nav>
            <a href="index.html">sobre</a>
            <a href="cadastro.html">cadastrar</a>
        </nav>
    </header>
<br><br><br><br>
<div id="login" class="linha"></div>

    <div>
        <main class="login">
          <form>
            <h1>Faça login para ter acesso !</h1>
            <div class="id_email">
                <input type="email" id="input_email" placeholder="Usuário">
            </div>
            <div class="id_senha">
                <input type="text" id="input_senha" placeholder="Senha">
            </div>
            <div class="id_csenha">
                <input type="password" id="input_csenha" placeholder="Confirme sua senha">
            </div>
            <div class="id_button">
            <button type="submit">Entrar</button>
            </div>
            <div class="register-link">
                <p>Não tem uma conta? <a href="cadastro.html" class="link">Cadastre-se</a></p>
            </div>
          </form>
        </main>
    </div>
    <div class="linha"></div>
    <div class="container">
        <p>2026 GYMTECH. Feito por<a href="https://www.linkedin.com/in/nicolas-augusto-da-silva-62b828246" class="link" > Nicolas Augusto da Silva.</a></p>
